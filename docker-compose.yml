services:
  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "cp -rp /opt/public_backup/* /var/www/html/public/ && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php-fpm"
    depends_on:
      - db
    environment:
      - APP_NAME="Master Data Hub"
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8085
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-hrm_data}
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
      - CACHE_STORE=database
      - APP_KEY=${APP_KEY}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - ODOO_SHARED_SECRET=${ODOO_SHARED_SECRET}
      - ODOO_WEBHOOK_SECRET=${ODOO_WEBHOOK_SECRET}
      - ODOO_ALLOWED_CALLBACK_HOSTS=${ODOO_ALLOWED_CALLBACK_HOSTS}
      - ODOO_URL_EXPIRY_SECONDS=${ODOO_URL_EXPIRY_SECONDS:-300}
    volumes:
      - public-assets:/var/www/html/public
      - storage-data:/var/www/html/storage
    networks:
      - hrm-network

  nginx:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8085:80"
    volumes:
      - public-assets:/var/www/html/public
    depends_on:
      - app
    networks:
      - hrm-network

  db:
    restart: unless-stopped
    image: mysql:8.0
    ports:
      - "3311:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-hrm_data}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_USER: ${DB_USERNAME:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - hrm-network

networks:
  hrm-network:
    driver: bridge

volumes:
  db_data:
  public-assets:
  storage-data:
